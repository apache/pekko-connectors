apiVersion: batch/v1
kind: Job
metadata:
  name: gke-full-feature-test
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 600
  template:
    spec:
      serviceAccountName: pekko-test
      containers:
      - name: test
        image: us-central1-docker.pkg.dev/pekko-connectors/pekko-test/gke-auth-test:latest
        env:
        - name: MAIN_CLASS
          value: "org.apache.pekko.stream.connectors.googlecloud.pubsub.grpc.gke.GkeFullFeatureTest"
        - name: PROJECT_ID
          value: "pekko-connectors"
        - name: TOPIC
          value: "simpleTopic"
        - name: SUBSCRIPTION
          value: "simpleSubscription"
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
      restartPolicy: Never
